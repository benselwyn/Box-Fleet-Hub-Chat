<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FQ Fleet Research Expert</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F6F8;
    --surface: #FFFFFF;
    --border: #DDE2E8;
    --navy: #1B2A4A;
    --teal: #2A9D8F;
    --teal-light: #E8F5F3;
    --text: #1B2A4A;
    --text-muted: #6B7A8D;
    --user-bg: #1B2A4A;
    --user-text: #FFFFFF;
    --ai-bg: #FFFFFF;
    --font-ui: 'Segoe UI', Arial, sans-serif;
  }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--navy);
    flex-shrink: 0;
  }

  .header-logo {
    height: 32px;
    width: auto;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal);
    margin-left: auto;
    box-shadow: 0 0 6px var(--teal);
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .fullscreen-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .fullscreen-btn:hover {
    color: var(--navy);
    border-color: var(--navy);
  }

  .fullscreen-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  .avatar.ai { background: var(--navy); color: #fff; }
  .avatar.user { background: var(--teal); color: #fff; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
    color: var(--text);
    box-shadow: 0 1px 3px rgba(27,42,74,0.06);
  }

  .bubble.user {
    background: var(--user-bg);
    border-bottom-right-radius: 2px;
    color: var(--user-text);
  }

  .bubble strong { color: var(--teal); }
  .bubble em { color: var(--text-muted); font-style: normal; font-size: 12px; }

  .chart-wrap {
    margin-top: 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    max-width: 100%;
  }

  .chart-wrap canvas { max-height: 260px; }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; align-items: center; height: 18px; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13.5px;
    padding: 9px 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--teal); }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--navy);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--teal); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Starter prompts */
  .prompts {
    padding: 0 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }

  .prompt-chip {
    background: transparent;
    border: 1px solid var(--teal);
    border-radius: 16px;
    color: var(--navy);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 5px 12px;
    transition: background 0.15s, color 0.15s;
    text-align: left;
  }

  .prompt-chip:hover {
    background: var(--teal);
    color: #fff;
  }

  /* Detail toggle */
  .detail-btn {
    height: 36px;
    padding: 0 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 12px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .detail-btn.active {
    background: var(--teal-light);
    border-color: var(--teal);
    color: var(--teal);
  }

  .detail-btn:hover:not(.active) {
    border-color: var(--navy);
    color: var(--navy);
  }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="Fifth Quadrant" class="header-logo" />
  <div class="header-divider"></div>
  <div>
    <div class="header-title">FQ Fleet Research Expert</div>
    <div class="header-sub">Powered by Fifth Quadrant Research</div>
  </div>
  <div class="status-dot"></div>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg id="fs-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.5 1h4v1.5h-2.5v2.5h-1.5v-4zm9 0h4v4h-1.5v-2.5h-2.5v-1.5zm-9 9h1.5v2.5h2.5v1.5h-4v-4zm10.5 2.5v-2.5h1.5v4h-4v-1.5h2.5z"/>
    </svg>
  </button>
</div>

<div id="chatUI" style="flex:1; flex-direction:column; overflow:hidden; display:flex;">
  <div class="messages" id="messages"></div>
  <div class="prompts" id="prompts">
    <button class="prompt-chip" onclick="usePrompt(this)">What are the key barriers to EV adoption in Australian corporate fleets?</button>
    <button class="prompt-chip" onclick="usePrompt(this)">How do fleet decision-makers choose between HEV, PHEV, and BEV?</button>
    <button class="prompt-chip" onclick="usePrompt(this)">What role do FMOs play in supporting fleet electrification?</button>
    <button class="prompt-chip" onclick="usePrompt(this)">What are the top service and maintenance priorities for fleet managers?</button>
  </div>
  <div class="input-area">
    <textarea id="userInput" placeholder="Ask about fleet research..." rows="1" maxlength="1000" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="detail-btn" id="detailBtn" onclick="toggleDetail()" title="Request a more detailed response">Detail</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
  const HUB_ID = "887999410";
  const HUB_TITLE = "Fleet Research";
  let messages = [];
  let loading = false;
  let detailed = false;

  const expandIcon = `<path d="M1.5 1h4v1.5h-2.5v2.5h-1.5v-4zm9 0h4v4h-1.5v-2.5h-2.5v-1.5zm-9 9h1.5v2.5h2.5v1.5h-4v-4zm10.5 2.5v-2.5h1.5v4h-4v-1.5h2.5z"/>`;
  const collapseIcon = `<path d="M5.5 1.5v2.5h-2.5v1.5h4v-4h-1.5zm5 0h-1.5v4h4v-1.5h-2.5v-2.5zm-7.5 7.5h-2.5v1.5h4v-4h-1.5v2.5zm7.5-2.5v4h1.5v-4h-4v1.5h2.5z"/>`;

  function toggleFullscreen() {
    const icon = document.getElementById("fs-icon");
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => {
        icon.innerHTML = collapseIcon;
      }).catch(() => {
        window.open(window.location.href, "_blank");
      });
    } else {
      document.exitFullscreen().then(() => {
        icon.innerHTML = expandIcon;
      });
    }
  }

  document.addEventListener("fullscreenchange", () => {
    const icon = document.getElementById("fs-icon");
    if (!document.fullscreenElement) icon.innerHTML = expandIcon;
  });

  window.onload = () => {
    activateChat();
    document.getElementById("userInput").addEventListener("input", updateSendBtn);
  };

  function activateChat() {
    document.getElementById("chatUI").style.display = "flex";
  }

  function updateSendBtn() {
    const val = document.getElementById("userInput").value.trim();
    document.getElementById("sendBtn").disabled = !val || loading;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function usePrompt(chip) {
    const input = document.getElementById("userInput");
    input.value = chip.textContent;
    autoResize(input);
    updateSendBtn();
    document.getElementById("prompts").style.display = "none";
    sendMessage();
  }

  function toggleDetail() {
    detailed = !detailed;
    const btn = document.getElementById("detailBtn");
    btn.textContent = detailed ? "Detail \u2713" : "Detail";
    btn.classList.toggle("active", detailed);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    renderMessage(role, content);
  }

  function renderMessage(role, content, id) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (id) div.id = id;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "FQ" : "You";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.replaceChildren(formatContent(content));

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  const FQ_COLOURS = ["#1B2A4A","#2A9D8F","#E9C46A","#E76F51","#6B7A8D","#264653","#A8DADC"];

  function renderChart(jsonStr) {
    let spec;
    try { spec = JSON.parse(jsonStr); } catch { return ""; }
    if (!spec.labels || !spec.datasets) return "";

    const wrap = document.createElement("div");
    wrap.className = "chart-wrap";
    const canvas = document.createElement("canvas");
    wrap.appendChild(canvas);

    const isHorizontal = spec.type === "horizontalBar";
    const chartType = isHorizontal ? "bar" : spec.type;

    const isPie = chartType === "pie" || chartType === "doughnut";

    const datasets = spec.datasets.map((ds, i) => ({
      label: ds.label || "",
      data: ds.data,
      backgroundColor: isPie
        ? spec.labels.map((_, j) => FQ_COLOURS[j % FQ_COLOURS.length])
        : FQ_COLOURS[i % FQ_COLOURS.length],
      borderColor: isPie ? "#fff" : FQ_COLOURS[i % FQ_COLOURS.length],
      borderWidth: isPie ? 2 : 0,
      borderRadius: (!isPie && !isHorizontal) ? 4 : 0,
    }));

    setTimeout(() => {
      new Chart(canvas, {
        type: chartType,
        data: { labels: spec.labels, datasets },
        options: {
          indexAxis: isHorizontal ? "y" : "x",
          responsive: true,
          plugins: {
            legend: { display: isPie, position: "bottom", labels: { font: { family: "Segoe UI, Arial" }, color: "#1B2A4A" } },
            title: { display: !!spec.title, text: spec.title, color: "#1B2A4A", font: { family: "Segoe UI, Arial", size: 13, weight: "600" }, padding: { bottom: 12 } },
          },
          scales: isPie ? {} : {
            x: { ticks: { color: "#6B7A8D", font: { family: "Segoe UI, Arial", size: 11 } }, grid: { color: "#DDE2E8" } },
            y: { ticks: { color: "#6B7A8D", font: { family: "Segoe UI, Arial", size: 11 } }, grid: { color: "#DDE2E8" } },
          },
        },
      });
    }, 0);

    return wrap;
  }

  function formatContent(text) {
    // Split out ```chart blocks first
    const chartRegex = /```chart\n([\s\S]*?)```/g;
    const parts = [];
    let lastIndex = 0;
    let match;

    while ((match = chartRegex.exec(text)) !== null) {
      if (match.index > lastIndex) parts.push({ type: "text", content: text.slice(lastIndex, match.index) });
      parts.push({ type: "chart", content: match[1].trim() });
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < text.length) parts.push({ type: "text", content: text.slice(lastIndex) });

    const container = document.createDocumentFragment();
    for (const part of parts) {
      if (part.type === "chart") {
        const el = renderChart(part.content);
        if (el) container.appendChild(el);
      } else {
        const span = document.createElement("span");
        let t = part.content
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        t = t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        t = t.replace(/`([^`]+)`/g, "<em>$1</em>");
        span.innerHTML = t;
        container.appendChild(span);
      }
    }
    return container;
  }

  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "FQ";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("prompts").style.display = "none";

    addMessage("user", text);
    showTyping();

    const apiMessages = messages
      .filter(m => m.role !== "system")
      .map(m => ({ role: m.role === "ai" ? "assistant" : m.role, content: m.content }));

    try {
      const PROXY_URL = "https://box-fleet-hub-chat-production.up.railway.app/chat";

      const response = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: apiMessages, detailed })
      });

      if (!response.ok) {
        const data = await response.json();
        throw new Error(data.error || "Proxy error");
      }

      // Stream the response
      removeTyping();
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message ai";
      const avatar = document.createElement("div");
      avatar.className = "avatar ai";
      avatar.textContent = "FQ";
      const bubble = document.createElement("div");
      bubble.className = "bubble ai";
      div.appendChild(avatar);
      div.appendChild(bubble);
      container.appendChild(div);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const evt = JSON.parse(raw);
            if (evt.text) {
              fullText += evt.text;
              bubble.replaceChildren(formatContent(fullText));
              container.scrollTop = container.scrollHeight;
            }
          } catch {}
        }
      }

      // Store complete message in history
      messages.push({ role: "ai", content: fullText || "No response received from the hub." });

    } catch (err) {
      removeTyping();
      addMessage("ai", `**Error:** ${err.message || "Something went wrong. Please try again."}`);
    } finally {
      loading = false;
      updateSendBtn();
    }
  }
</script>
</body>
</html>
