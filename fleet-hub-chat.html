<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FQ Fleet Research Expert</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F6F8;
    --surface: #FFFFFF;
    --border: #DDE2E8;
    --navy: #1B2A4A;
    --teal: #2A9D8F;
    --teal-light: #E8F5F3;
    --text: #1B2A4A;
    --text-muted: #6B7A8D;
    --user-bg: #1B2A4A;
    --user-text: #FFFFFF;
    --ai-bg: #FFFFFF;
    --font-ui: 'Segoe UI', Arial, sans-serif;
  }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--navy);
    flex-shrink: 0;
  }

  .header-logo {
    height: 32px;
    width: auto;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal);
    margin-left: auto;
    box-shadow: 0 0 6px var(--teal);
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .fullscreen-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .fullscreen-btn:hover {
    color: var(--navy);
    border-color: var(--navy);
  }

  .fullscreen-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  .avatar.ai { background: var(--navy); color: #fff; }
  .avatar.user { background: var(--teal); color: #fff; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
    color: var(--text);
    box-shadow: 0 1px 3px rgba(27,42,74,0.06);
  }

  .bubble.user {
    background: var(--user-bg);
    border-bottom-right-radius: 2px;
    color: var(--user-text);
  }

  .bubble strong { color: var(--teal); }
  .bubble em { color: var(--text-muted); font-style: normal; font-size: 12px; }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; align-items: center; height: 18px; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13.5px;
    padding: 9px 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--teal); }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--navy);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--teal); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="Fifth Quadrant" class="header-logo" />
  <div class="header-divider"></div>
  <div>
    <div class="header-title">FQ Fleet Research Expert</div>
    <div class="header-sub">Powered by Fifth Quadrant Research</div>
  </div>
  <div class="status-dot"></div>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg id="fs-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.5 1h4v1.5h-2.5v2.5h-1.5v-4zm9 0h4v4h-1.5v-2.5h-2.5v-1.5zm-9 9h1.5v2.5h2.5v1.5h-4v-4zm10.5 2.5v-2.5h1.5v4h-4v-1.5h2.5z"/>
    </svg>
  </button>
</div>

<div id="chatUI" style="flex:1; flex-direction:column; overflow:hidden; display:flex;">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="Ask about fleet research..." rows="1" maxlength="1000" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
  const HUB_ID = "887999410";
  const HUB_TITLE = "Fleet Research";
  let messages = [];
  let loading = false;

  const expandIcon = `<path d="M1.5 1h4v1.5h-2.5v2.5h-1.5v-4zm9 0h4v4h-1.5v-2.5h-2.5v-1.5zm-9 9h1.5v2.5h2.5v1.5h-4v-4zm10.5 2.5v-2.5h1.5v4h-4v-1.5h2.5z"/>`;
  const collapseIcon = `<path d="M5.5 1.5v2.5h-2.5v1.5h4v-4h-1.5zm5 0h-1.5v4h4v-1.5h-2.5v-2.5zm-7.5 7.5h-2.5v1.5h4v-4h-1.5v2.5zm7.5-2.5v4h1.5v-4h-4v1.5h2.5z"/>`;

  function toggleFullscreen() {
    const icon = document.getElementById("fs-icon");
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => {
        icon.innerHTML = collapseIcon;
      }).catch(() => {
        window.open(window.location.href, "_blank");
      });
    } else {
      document.exitFullscreen().then(() => {
        icon.innerHTML = expandIcon;
      });
    }
  }

  document.addEventListener("fullscreenchange", () => {
    const icon = document.getElementById("fs-icon");
    if (!document.fullscreenElement) icon.innerHTML = expandIcon;
  });

  window.onload = () => {
    activateChat();
    document.getElementById("userInput").addEventListener("input", updateSendBtn);
  };

  function activateChat() {
    document.getElementById("chatUI").style.display = "flex";
  }

  function updateSendBtn() {
    const val = document.getElementById("userInput").value.trim();
    document.getElementById("sendBtn").disabled = !val || loading;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    renderMessage(role, content);
  }

  function renderMessage(role, content, id) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (id) div.id = id;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "FQ" : "You";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatContent(content);

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatContent(text) {
    text = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/`([^`]+)`/g, "<em>$1</em>");
    return text;
  }

  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "FQ";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;

    addMessage("user", text);
    showTyping();

    const apiMessages = messages
      .filter(m => m.role !== "system")
      .map(m => ({ role: m.role === "ai" ? "assistant" : m.role, content: m.content }));

    try {
      const PROXY_URL = "https://box-fleet-hub-chat-production.up.railway.app/chat";

      const response = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: apiMessages })
      });

      if (!response.ok) {
        const data = await response.json();
        throw new Error(data.error || "Proxy error");
      }

      // Stream the response
      removeTyping();
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message ai";
      const avatar = document.createElement("div");
      avatar.className = "avatar ai";
      avatar.textContent = "FQ";
      const bubble = document.createElement("div");
      bubble.className = "bubble ai";
      div.appendChild(avatar);
      div.appendChild(bubble);
      container.appendChild(div);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const evt = JSON.parse(raw);
            if (evt.text) {
              fullText += evt.text;
              bubble.innerHTML = formatContent(fullText);
              container.scrollTop = container.scrollHeight;
            }
          } catch {}
        }
      }

      // Store complete message in history
      messages.push({ role: "ai", content: fullText || "No response received from the hub." });

    } catch (err) {
      removeTyping();
      addMessage("ai", `**Error:** ${err.message || "Something went wrong. Please try again."}`);
    } finally {
      loading = false;
      updateSendBtn();
    }
  }
</script>
</body>
</html>
