<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fleet Research Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #238636;
    --accent-bright: #2ea043;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --user-bg: #1f3a4d;
    --user-border: #1f6feb;
    --ai-bg: #161b22;
    --font-ui: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-bright);
    margin-left: auto;
    box-shadow: 0 0 6px var(--accent-bright);
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .avatar.ai { background: var(--accent); font-family: var(--font-mono); font-weight: 600; font-size: 11px; color: #fff; }
  .avatar.user { background: var(--user-bg); border: 1px solid var(--user-border); font-size: 13px; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-bottom-right-radius: 2px;
    color: var(--text);
  }

  .bubble strong { color: #79c0ff; }
  .bubble em { color: var(--text-muted); font-style: normal; font-family: var(--font-mono); font-size: 12px; }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; align-items: center; height: 18px; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13.5px;
    padding: 9px 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent-bright); }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--accent-bright); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* API key prompt */
  .key-prompt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .key-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }

  .key-card h2 { font-size: 15px; margin-bottom: 8px; color: var(--text); }
  .key-card p { font-size: 12.5px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }

  .key-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }

  .key-input:focus { border-color: var(--accent-bright); }

  .key-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .key-btn:hover { background: var(--accent-bright); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🚛</div>
  <div>
    <div class="header-title">Fleet Research Assistant</div>
    <div class="header-sub">box://hub/fleet-research</div>
  </div>
  <div class="status-dot"></div>
</div>



<div id="chatUI" style="flex:1; flex-direction:column; overflow:hidden; display:flex;">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="Ask about fleet research..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
  const HUB_ID = "887999410";
  const HUB_TITLE = "Fleet Research";
  let messages = [];
  let loading = false;

  window.onload = () => {
    activateChat();
    document.getElementById("userInput").addEventListener("input", updateSendBtn);
  };

  function updateSendBtn() {
    const val = document.getElementById("userInput").value.trim();
    document.getElementById("sendBtn").disabled = !val || loading;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    renderMessage(role, content);
  }

  function renderMessage(role, content, id) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (id) div.id = id;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "FQ" : "You";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatContent(content);

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatContent(text) {
    // Bold: **text**
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    // Inline code: `text`
    text = text.replace(/`([^`]+)`/g, "<em>$1</em>");
    return text;
  }

  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "FQ";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;

    addMessage("user", text);
    showTyping();

    const systemPrompt = `You are an intelligent research assistant connected to the "${HUB_TITLE}" Box Hub (hub_id: ${HUB_ID}).

When the user asks a question:
1. Use the Box ai_qa_hub tool with hub_id="${HUB_ID}" to retrieve information from the hub.
2. Answer clearly and concisely based on the hub content.
3. If citing specific documents or sources, mention them briefly.
4. Keep responses focused and professional — this is a fleet industry research context.
5. If a question is outside the hub's content scope, say so briefly and suggest what the hub can help with.`;

    const apiMessages = messages
      .filter(m => m.role !== "system")
      .map(m => ({ role: m.role === "ai" ? "assistant" : m.role, content: m.content }));

    try {
      const PROXY_URL = "REPLACE_WITH_YOUR_RAILWAY_URL/chat";

      const response = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: systemPrompt,
          messages: apiMessages
        })
      });

      const data = await response.json();

      if (!response.ok) throw new Error(data.error || "Proxy error");

      removeTyping();
      addMessage("ai", data.reply || "No response received from the hub.");

    } catch (err) {
      removeTyping();
      addMessage("ai", `**Error:** ${err.message || "Something went wrong. Please try again."}`);
    } finally {
      loading = false;
      updateSendBtn();
    }
  }
</script>
</body>
</html>
